<!DOCTYPE html>
<!--
  base.html — Master layout template
  All other templates extend this one using Jinja2's {% extends %} and {% block %}.
  This keeps the navigation, header, and footer consistent across every page.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ app_name }} {% block title %}{% endblock %}</title>
  <!-- Our custom stylesheet, served by Flask's static file handler -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ── Navigation Bar ────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-container">
      <!-- Brand / logo area -->
      <a class="nav-brand" href="{{ url_for('home') }}">
        🐳 {{ app_name }}
      </a>
      <!-- Page links -->
      <ul class="nav-links">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('register') }}">Register</a></li>
        <li><a href="{{ url_for('students') }}">Students</a></li>
        <li><a href="{{ url_for('stats') }}">Stats</a></li>
        <li><a href="{{ url_for('reset') }}" class="nav-reset">Reset</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Main Content ──────────────────────────────────────────────────── -->
  <main class="main-content">
    <!--
      Each child template fills in the "content" block.
      {{ super() }} is not used here; each page completely replaces this block.
    -->
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-container">
      <p>
        🐳 <strong>{{ app_name }}</strong> &mdash; Docker Compose Workshop
        &nbsp;|&nbsp;
        Built with <a href="https://flask.palletsprojects.com/" target="_blank">Flask</a>
        &amp; <a href="https://redis.io/" target="_blank">Redis</a>
      </p>
    </div>
  </footer>

</body>
</html>
