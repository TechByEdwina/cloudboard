services:

  app:
    build:
      context: ./app
    ports:
      - "${FLASK_PORT:-5000}:5000"
    environment:
      APP_NAME:     "${APP_NAME:-CloudBoard}"
      APP_GREETING: "${APP_GREETING:-Welcome to the Docker Compose Workshop!}"
      REDIS_HOST:   "${REDIS_HOST:-redis}"
      REDIS_PORT:   "${REDIS_PORT:-6379}"
      FLASK_PORT:   "${FLASK_PORT:-5000}"
      FLASK_DEBUG:  "${FLASK_DEBUG:-0}"
    depends_on:
      - redis
    networks:
      - cloudboard-net
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --appendonly yes
    networks:
      - cloudboard-net
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - cloudboard-net
    restart: unless-stopped

volumes:
  redis-data:

networks:
  cloudboard-net:
    driver: bridge

